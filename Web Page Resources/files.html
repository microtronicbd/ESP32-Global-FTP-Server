<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>📂 ESP32 File Explorer</title>
<link rel="stylesheet" href="/style.css">
<style>
  table { width:100%; border-collapse: collapse; }
  th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
  .action-btn { border:none; background:none; cursor:pointer; font-size:18px; margin: 0 5px; }
  .action-btn:hover { transform: scale(1.2); }

  /* Preview Modal */
  #previewModal {
    display:none;
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:9999;
  }
  #previewContent {
    background:#111; padding:10px; border-radius:10px;
    max-width:90%; max-height:90%;
    overflow:auto;
  }
  #previewFrame, #previewImg, #previewVideo {
    max-width:100%; max-height:80vh; display:block; margin:auto;
  }
  #closePreview {
    background:red; color:white; border:none;
    padding:8px 15px; border-radius:8px; margin-top:10px;
    cursor:pointer;
  }
</style>
</head>
<body>
<header><h2>📁 File Explorer</h2></header>

<nav>
  <a href="/">Upload</a>
  <a href="/file" class="active">Files</a>
  <a href="/system">System</a>
  <a href="/about">About</a>
</nav>

<section class="card">
  <h3>📋 File List</h3>
  <table>
    <thead>
      <tr>
        <th>Type</th>
        <th>Name</th>
        <th>Size</th>
        <th>Preview</th>
      </tr>
    </thead>
    <tbody id="fileList">Loading...</tbody>
  </table>
</section>

<!-- Preview Modal -->
<div id="previewModal">
  <div id="previewContent">
    <div id="previewBox"></div>
    <button id="closePreview" onclick="closePreview()">❌ Close</button>
  </div>
</div>

<script src="/script.js"></script>

<footer style="text-align:center; margin:30px 0; color:#666; font-size:13px;">
  © 2025 ElectriTrend
</footer>
</body>
</html>
