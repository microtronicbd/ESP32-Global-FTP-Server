 <html lang="en">

  <body> 
    <header> 
      <h2>📁 ESP32 SD File Hub</h2> 
    </header> 
    <nav> 
      <a href="/" class="active">Upload</a> 
      <a href="/file">Files</a>
      <a href="/system">System</a> 
      <a href="/about">About</a> 
    </nav> <section class="card"> 
      <h3>⬆️ Upload File</h3> 
      <form id="uploadForm" method="POST" action="/upload" enctype="multipart/form-data"> 
        <input type="file" name="data" id="fileInput" required>
         <button type="submit">Upload</button> 
        </form> <div class="progress">
          <div class="bar" id="bar">

          </div>
        </div>

       <section class="card"> 
        <h3>📡 System Status</h3> 
        <div id="statusBox">Loading...</div> 
      </section> 

       <!-- ✅ YouTube Video Preview Section -->
      <section class="card">
        <h3>🎬 ElectriTrend YouTube Gallery</h3>
          <div class="video-gallery" id="ytGallery"></div>
      </section>
